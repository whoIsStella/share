filter {
  if [log_source] == "pcap_meta" {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
      tag_on_failure => ["_dateparsefailure_pcap"]
    }

    if [src_ip] {
      geoip {
        source => "src_ip"
        target => "geoip"
      }
    }

    mutate {
      add_field => { "honeypot_surface" => "pcap" }
    }
  }
}

output {
  if [log_source] == "pcap_meta" {
    elasticsearch {
      hosts => ["localhost:9200"]
      index => "hive-pcap-%{+YYYY.MM.dd}"
    }
  }
}
