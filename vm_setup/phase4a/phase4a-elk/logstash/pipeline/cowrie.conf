filter {
  if [log_source] == "cowrie" {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
      tag_on_failure => ["_dateparsefailure_cowrie"]
    }

    geoip {
      source => "src_ip"
      target => "geoip"
    }

    mutate {
      rename => { "eventid" => "cowrie_event_type" }  # normalized for dashboard queries
      add_field => { "honeypot_surface" => "ssh" }
    }
  }
}

output {
  if [log_source] == "cowrie" {
    elasticsearch {
      hosts => ["localhost:9200"]
      index => "hive-cowrie-%{+YYYY.MM.dd}"
    }
  }
}
